<section class="auth-page">
  <div class="card">
    <a routerLink="/" class="brand">
      <span class="logo">🏠</span>
      <span>PropertyProof</span>
    </a>

    <h2>Sign in</h2>
    <p class="sub">
      Sign in to manage the registry, submit on behalf of clients, or check on your application.
    </p>

    <form (submit)="submit(); $event.preventDefault()">
      <label class="field">
        <span>Email</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>

      <label class="field">
        <span>Password</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="At least 6 characters"
          autocomplete="current-password"
        />
      </label>

      <button class="primary" [disabled]="busy()">
        @if (busy()) { Working… } @else { Sign in }
      </button>
    </form>

    @if (error(); as e) {
      <div class="alert err">{{ e }}</div>
    }

    <p class="link-row">
      Don't have an account? <a routerLink="/signup">Sign up</a>
    </p>

    <div class="dev-hint">
      <strong>Local dev shortcut</strong>
      <p>
        Bootstrap the super admin account in one click — uses
        <code>admin&#64;propertyproof.local</code> / <code>admin123</code>.
      </p>
      <button type="button" class="ghost" (click)="fillAdmin()">
        Use admin credentials
      </button>
    </div>
  </div>
</section>
